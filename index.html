.mode-badge.actual{background:#e6f7ee;color:#52c41a;border:1px solid #b7e1c5}

.kpi-card.green{background:linear-gradient(135deg,#e6f7ee,#d4f0df);border:1px solid #b7e1c5}

.warn-banner{background:#fffbe6;border:1px solid #ffe58f;border-radius:4px;padding:9px 14px;margin-bottom:14px;font-size:12px;color:#ad6800;display:flex;align-items:flex-start;gap:6px;line-height:1.7}
.warn-banner .warn-icon{color:#faad14;font-size:16px;flex-shrink:0;line-height:1.5}

.filter-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;font-size:13px;flex-wrap:wrap}

.tab-nav{display:flex;border-bottom:2px solid #e8e8e8;margin-bottom:16px}
.tab-nav .tab{padding:7px 18px;cursor:pointer;color:#666;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-nav .tab:hover{color:#5b8def}
.tab-nav .tab.active{color:#5b8def;border-bottom-color:#5b8def;font-weight:600}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:8px;width:90%;max-width:900px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.15)}

.export-preview{border:1px solid #e8e8e8;border-radius:6px;padding:20px 24px;background:#fff}

/* Button group */
.btn-group{display:flex;gap:8px;margin-top:8px}

// ============ DEPARTMENT SCALING ============
function fmt(n, decimals){ return (n * deptScale).toFixed(decimals||2); }
function fmtM(n){ return '<span style="font-size:13px">万</span>'; }

var dataTpl = {}; // store original strings for rebuild

function saveTemplates(){
  ['actual','estimated'].forEach(function(mode){
    var d = data[mode];
    dataTpl[mode] = {
      progressTitle: d.progressTitle, progressTarget: d.progressTarget,
      progressDone: d.progressDone, progressRemain: d.progressRemain
    };
  });
}

function updateDeptData(){
  ['actual','estimated'].forEach(function(mode){
    var d = data[mode];
    var t = dataTpl[mode];
    if(!t) return;
    var mt = (150*deptScale).toFixed(2);
    // Progress
    d.progressTitle = deptName + t.progressTitle.replace(/^[^·]+/, '');
    var targetVal = parseFloat(mt);
    var doneVal = mode==='actual' ? (148.80*deptScale).toFixed(2) : (155.00*deptScale).toFixed(2);
    var remainVal = (targetVal - parseFloat(doneVal)).toFixed(2);
    var pct = Math.min((parseFloat(doneVal)/targetVal*100), 999.9).toFixed(1);
    d.progressPct = pct + '%';
    d.progressWidth = Math.min(parseFloat(pct), 100) + '%';
    d.progressTarget = mt + '万（本月目标毛利）';
    d.progressDone = doneVal + '万（' + (mode==='actual'?'订单实际毛利':'预估订单毛利') + '）';
    d.progressRemain = remainVal >= 0 ? (remainVal + '万（距目标差额）') : ('超额 +' + Math.abs(remainVal).toFixed(2) + '万');
    // KPI Row1 values
    d.kpiRow1[0].valueHtml = doneVal + fmtM();
    // KPI Row2 values
    var cost = (77.70*deptScale).toFixed(2);
    var estCost = (83.76*deptScale).toFixed(2);
    d.kpiRow2[2].valueHtml = mode==='actual' ? cost + fmtM() : estCost + fmtM();
    d.kpiRow2[3].valueHtml = (287.30*deptScale).toFixed(2) + fmtM();
    // Detail bar
    d.detailBarInfo = d.orderQty+'条订单 · 合计销售额 ' + (mode==='actual'?(835.00*deptScale).toFixed(2):(715.00*deptScale).toFixed(2)) + '万';
    // Order totals
    d.orderSalesTotal = (mode==='actual' ? (835.00*deptScale) : (715.00*deptScale)).toFixed(2);
    d.orderProfitTotal = (mode==='actual' ? (219.20*deptScale) : (188.00*deptScale)).toFixed(2);
    d.orderCostTotal = (mode==='actual' ? (615.80*deptScale) : (528.47*deptScale)).toFixed(2);
    // Fee table - rebuild
    var mProfit = mode==='actual' ? '148.80' : '155.00';
    var mCost = mode==='actual' ? '77.70' : '83.76';
    var mLoss = (12.30*deptScale).toFixed(2);
    d.feeTableRows = '<tr><td>订单毛利'+(mode==='actual'?'（实际）':'（预估，来自订单预测）')+'</td><td style="text-align:right" class="positive">+'+(parseFloat(mProfit)*deptScale).toFixed(2)+'</td><td style="text-align:right" class="positive">+'+(987.68*deptScale).toFixed(2)+'</td></tr>'+
      '<tr><td>人力成本（人事部录入）</td><td style="text-align:right" class="negative">'+(38.40*deptScale*-1).toFixed(2)+'</td><td style="text-align:right" class="negative">'+(238.40*deptScale*-1).toFixed(2)+'</td></tr>'+
      '<tr><td>项目费用（财务部录入）</td><td style="text-align:right" class="negative">'+(22.18*deptScale*-1).toFixed(2)+'</td><td style="text-align:right" class="negative">'+(132.60*deptScale*-1).toFixed(2)+'</td></tr>'+
      '<tr><td>公摊费用（水电物业/房租）</td><td style="text-align:right" class="negative">'+(15.66*deptScale*-1).toFixed(2)+'</td><td style="text-align:right" class="negative">'+(93.60*deptScale*-1).toFixed(2)+'</td></tr>'+
      '<tr><td>公司补贴</td><td style="text-align:right" class="positive">+'+(5.00*deptScale).toFixed(2)+'</td><td style="text-align:right" class="positive">+'+(30.00*deptScale).toFixed(2)+'</td></tr>'+
      '<tr><td>逾期利息</td><td style="text-align:right" class="negative">'+mLoss+'</td><td style="text-align:right" class="negative">'+mLoss+'</td></tr>'+
      '<tr class="total-row"><td>利润小计</td><td style="text-align:right;font-weight:700">'+(parseFloat(mCost)*deptScale).toFixed(2)+' 万</td><td style="text-align:right;font-weight:700">'+(287.30*deptScale).toFixed(2)+' 万</td></tr>';
  });
}
saveTemplates();

// ============ RENDER FUNCTIONS ============
function renderDashboard(d) {
  // Progress card
  var pc = document.getElementById('progress-card');
  pc.className = 'progress-card' + (d.progressCardClass ? ' ' + d.progressCardClass : '');
  document.getElementById('prog-title').textContent = d.progressTitle;
  document.getElementById('prog-pct').textContent = d.progressPct;
  // Cap bar width at 100% for display
  var w = parseFloat(d.progressWidth);
  document.getElementById('prog-fill').style.width = Math.min(w, 100) + '%';
  document.getElementById('prog-target').textContent = d.progressTarget;
  document.getElementById('prog-done').textContent = d.progressDone;
  document.getElementById('prog-remain').textContent = d.progressRemain;

  // KPI Row 1
  document.getElementById('kpi-row1').innerHTML = d.kpiRow1.map(function(k){
    return '<div class="kpi-card">'+
      '<div class="kpi-label">'+k.label+'</div>'+
      '<div class="kpi-value" style="color:'+k.valColor+(k.valSize?';font-size:'+k.valSize:'')+'">'+k.valueHtml+'</div>'+
      '<div class="kpi-change'+(k.change?' '+k.change:'')+'" style="'+(k.change?'':'color:#999')+'">'+
        (k.change==='up'?'<span>▲</span> ':k.change==='down'?'<span>▼</span> ':'')+k.changeText+'</div>'+
      (k.footnote?'<div style="font-size:11px;color:#e04040;margin-top:2px">'+k.footnote+'</div>':'')+
      '</div>';
  }).join('');

  // KPI Row 2
  var r2html = d.kpiRow2.map(function(k){
    return '<div class="kpi-card'+(k.extraClass?' '+k.extraClass:'')+'">'+
      '<div class="kpi-label">'+k.label+'</div>'+
      '<div class="kpi-value" style="color:'+k.valColor+';font-size:'+(k.valSize||'20px')+'">'+k.valueHtml+'</div>'+
      '<div class="kpi-change'+(k.change?' '+k.change:'')+'" style="'+(k.change?'':'color:#999')+'">'+
        (k.change==='up'?'<span>▲</span> ':k.change==='down'?'<span>▼</span> ':'')+k.changeText+'</div>'+
      (k.footnote?'<div style="font-size:11px;color:#e04040;margin-top:2px">'+k.footnote+'</div>':'')+
      '</div>';
  }).join('');
  document.getElementById('kpi-row2').innerHTML = r2html;

  // Detail bar
  document.getElementById('detail-bar-label').textContent = d.detailBarLabel;
  document.getElementById('detail-bar-info').textContent = d.detailBarInfo;

  // Table
  document.getElementById('table-title').textContent = d.tableTitle;
  document.getElementById('fee-table-wrap').innerHTML = '<table class="data-table"><thead><tr><th>费用类型</th><th style="text-align:right">本月（万）</th><th style="text-align:right">本年累计（万）</th></tr></thead><tbody>'+d.feeTableRows+'</tbody></table>';

  // Chart title
  document.getElementById('chart-title').textContent = d.chartTitle;

  // Re-render chart
  renderChart(d);
}

function renderChart(d) {
  var ctx = document.getElementById('profitChart');
  if(!ctx) return;
  if(window.chartInstance) window.chartInstance.destroy();

  var datasets = [];
  if(d.chartActual) {
    datasets.push({
      label: d.chartActualLabel || '实际利润',
      data: d.chartActual,
      borderColor: '#5b8def',
      backgroundColor: 'rgba(91,141,239,.08)',
      tension: .3, fill: true, pointRadius: 4, pointBackgroundColor: '#5b8def',
      borderWidth: 2
    });
  }
  if(d.chartEstimated) {
    datasets.push({
      label: d.chartEstimatedLabel || '预估利润',
      data: d.chartEstimated,
      borderColor: '#fa8c16',
      backgroundColor: 'rgba(250,140,22,.06)',
      tension: .3, fill: true, pointRadius: 4, pointBackgroundColor: '#fa8c16',
      borderWidth: 2, borderDash: [5,3]
    });
  }
  if(d.chartTarget) {
    datasets.push({
      label: d.chartTargetLabel || '月度目标',
      data: d.chartTarget,
      borderColor: '#ffa940',
      backgroundColor: 'transparent',
      tension: .3, fill: false, pointRadius: 3, pointBackgroundColor: '#ffa940',
      borderWidth: 2, borderDash: [5,3]
    });
  }

  window.chartInstance = new Chart(ctx, {
    type:'line',
    data:{ labels: d.chartLabels, datasets: datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{usePointStyle:true,padding:20,font:{size:11}}},
        tooltip:{
          backgroundColor:'#fff',
          titleColor:'#333',
          bodyColor:'#666',
          borderColor:'#e8e8e8',
          borderWidth:1,
          padding:12,
          cornerRadius:6,
          titleFont:{size:13,weight:'600'},
          bodyFont:{size:12},
          displayColors:true,
          callbacks:{
            title:function(items){return items[0].label;},
            label:function(ctx){
              return ctx.dataset.label + '：' + ctx.parsed.y + '万';
            }
          }
        }
      },
      scales:{
        y:{min:40,max:100,ticks:{callback:function(v){return v+'万'},stepSize:10},grid:{color:'#f0f0f0'}},
        x:{grid:{display:false}}
      }
    }
  });
}

// ============ MODE SWITCH ============
function switchProfitMode(mode) {
  currentMode = mode;
  var btns = document.querySelectorAll('#mode-toggle .mode-btn');
  btns.forEach(function(b){ b.classList.remove('active'); });
  if(mode==='actual'){
    btns[0].classList.add('active');
  } else {
    btns[1].classList.add('active');
  }
  var d = data[mode];
  updateDeptData();
  initOrderStatusFilter();
  document.getElementById('dashboard-title').innerHTML = d.dashboardTitle + ' <span class="mode-badge '+d.modeBadgeClass+'">'+d.modeLabel+'</span>';
  renderDashboard(d);
  updateDetailBar();
}

function toggleSub(el){
  el.classList.toggle('expanded');
}

function manualRefresh(){
  var btn = document.querySelector('.refresh-btn');
  btn.classList.add('spin');
  var now = new Date();
  var ts = now.getFullYear()+'-'+
    String(now.getMonth()+1).padStart(2,'0')+'-'+
    String(now.getDate()).padStart(2,'0')+' '+
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
  document.getElementById('update-time').textContent = '数据更新时间：'+ts+'（每小时刷新）';
  setTimeout(function(){ btn.classList.remove('spin'); }, 600);
  showToast('数据已刷新');
}

function applyFilter(){
  var mo = document.getElementById('filter-month').value;
  var dept = document.getElementById('filter-dept').value;
  updateDetailBar();
  showToast('已应用筛选条件：'+dept+' · '+data[currentMode].modeLabel+'模式 · '+mo);
}

function applyDeptFilter(){
  var dept = document.getElementById('filter-dept').value;
  var cfg = deptConfig[dept];
  deptScale = cfg.scale;
  deptName = cfg.name;
  updateDeptData();
  renderDashboard(data[currentMode]);
  updateDetailBar();
  showToast('已切换至：'+dept);
}

function resetFilter(){
  setDefaultDates();
  document.getElementById('filter-dept').value='事业三部';
  deptScale = 1.0;
  deptName = '事业三部';
  updateDeptData();
  switchProfitMode('actual');
  showToast('已重置为实际毛利模式 · 事业三部 · 本月');
}

// Order detail modal
var orderStatusFilter = [];
function initOrderStatusFilter(){
  var d = data[currentMode];
  orderStatusFilter = (d.orderDefaultStatus||['已完成']).slice();
  var labels = document.querySelectorAll('#status-filter label');
  labels.forEach(function(l){
    var s = l.textContent;
    l.classList.remove('checked-ks','checked-zx','checked-wc');
    if(orderStatusFilter.indexOf(s) >= 0) l.classList.add(l.getAttribute('data-ck'));
  });
  updateDetailBar();
}

function toggleStatus(status, el){
  var idx = orderStatusFilter.indexOf(status);
  if(idx >= 0){ orderStatusFilter.splice(idx,1); el.classList.remove(el.getAttribute('data-ck')); }
  else { orderStatusFilter.push(status); el.classList.add(el.getAttribute('data-ck')); }
  updateDetailBar();
}

function updateDetailBar(){
  var d = data[currentMode];
  var filtered = d.orderRows.filter(function(r){ return orderStatusFilter.indexOf(r[6]) >= 0; });
  var salesSum = 0;
  filtered.forEach(function(r){ salesSum += parseFloat(r[2]); });
  document.getElementById('detail-bar-info').textContent = '已筛选 '+filtered.length+'条订单 · 合计销售额 '+salesSum.toFixed(2)+'万';
}

function renderOrderTable(){
  var d = data[currentMode];
  var filtered = d.orderRows.filter(function(r){ return orderStatusFilter.indexOf(r[6]) >= 0; });
  var salesSum=0,costSum=0,profitSum=0;
  filtered.forEach(function(r){ salesSum+=parseFloat(r[2]); costSum+=parseFloat(r[2])-parseFloat(r[4]); profitSum+=parseFloat(r[4]); });
  var isEst = currentMode==='estimated';
  var rows = filtered.map(function(r){
    var sc = r[6]==='已完成'?'#52c41a':r[6]==='执行中'?'#5b8def':'#fa8c16';
    return '<tr><td style="font-family:monospace;font-size:12px">'+r[0]+'</td><td>'+r[1]+'</td><td style="text-align:right">'+r[2]+'</td><td style="text-align:right;color:#999">'+r[3]+'</td><td style="text-align:right;color:#fa8c16;font-weight:500">'+r[4]+'</td><td style="text-align:right">'+r[5]+'</td><td><span style="color:'+sc+';font-size:11px">● '+r[6]+'</span></td></tr>';
  }).join('');
  var tbody = document.getElementById('order-tbody');
  tbody.innerHTML = rows + '<tr class="total-row" style="font-weight:700"><td colspan="2">合计（已筛选 '+filtered.length+' 条）</td><td style="text-align:right;font-weight:700">'+salesSum.toFixed(2)+'</td><td style="text-align:right;font-weight:700;color:#999">'+(salesSum/1.06).toFixed(2)+'</td><td style="text-align:right;font-weight:700;color:#fa8c16">'+profitSum.toFixed(2)+'</td><td style="text-align:right">'+(salesSum>0?(profitSum/salesSum*100).toFixed(1)+'%':'—')+'</td><td></td></tr>';
}

function showOrderDetail(){
  var d = data[currentMode];
  var isEst = currentMode==='estimated';
  var colLabel = isEst ? '预估毛利润' : '实际毛利润';
  var rateLabel = isEst ? '预估毛利率' : '实际毛利率';
  var modLabel = isEst ? '预估' : '实际';
  document.getElementById('order-modal-box').innerHTML =
    '<div class="modal-header"><h3>'+d.orderModalTitle+'</h3><button class="modal-close" onclick="closeModal(\'order-modal\')">✕</button></div>'+
    '<div class="modal-body">'+
      '<div class="modal-summary"><span>'+deptName+' · '+getDateRangeLabel()+'</span><span>按筛选状态展示</span><span>'+modLabel+'毛利合计 <strong style="color:#fa8c16">'+d.orderProfitTotal+'万</strong></span></div>'+
      '<table class="data-table"><thead><tr><th>订单编号</th><th>客户名称</th><th style="text-align:right">销售金额<br>（含税）万</th><th style="text-align:right">销售金额<br>（不含税）万</th><th style="text-align:right">'+colLabel+'<br>（万）</th><th style="text-align:right">'+rateLabel+'</th><th>状态</th></tr></thead>'+
      '<tbody id="order-tbody"></tbody></table>'+
    '</div>';
  document.getElementById('order-modal').classList.add('show');
  renderOrderTable();
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
}

document.addEventListener('click',function(e){
  if(e.target.classList.contains('modal-overlay')){
    e.target.classList.remove('show');
  }
});

// Toast
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none'},2500);
}

// Download export
function downloadExport(){
  var blob=new Blob([document.getElementById('export-content').innerText],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='事业部利润报表_'+deptName+'_'+getDateRangeLabel()+'.csv';
  a.click();
  showToast('报表已下载');
}

// Print export
function printExport(){
  var w=window.open('','_blank');
  w.document.write('<html><head><meta charset="utf-8"><title>事业部利润报表</title><style>body{font-family:"Microsoft YaHei",sans-serif;padding:20px}table{border-collapse:collapse;width:100%;margin-bottom:16px}th,td{border:1px solid #ddd;padding:6px 10px;text-align:left;font-size:12px}th{background:#f5f5f5}.total-row td{font-weight:700;background:#fafafa}h4{font-size:14px;margin:14px 0 8px}.positive{color:#52c41a}.negative{color:#e04040}</style></head><body>'+document.getElementById('export-content').innerHTML+'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},500);
}

// Date helpers
function setDefaultDates(){
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('filter-month').value = y+'-'+m;
}
function getDateRangeLabel(){
  var v = document.getElementById('filter-month').value;
  if(!v) return '本月';
  var p = v.split('-');
  return p[0]+'年'+parseInt(p[1])+'月';
}
setDefaultDates();
